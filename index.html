<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABRIOLAGame — Validação Real</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root { --gold: #d4af37; --neon: #00ff9d; --bg: #050505; }
    body { margin:0; font-family: 'Orbitron', sans-serif; background: var(--bg); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
    
    .monitor { border: 2px solid var(--gold); padding: 30px; border-radius: 20px; background: #0a0a0a; text-align: center; width: 350px; box-shadow: 0 0 50px rgba(212,175,55,0.15); border-style: double; }
    
    /* Display de Saldo */
    .balance-box { background: #000; border: 1px solid #333; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
    #balance { font-family: 'Share Tech Mono'; color: var(--neon); font-size: 2.5rem; transition: all 0.3s; }
    .balance-up { color: #fff !important; text-shadow: 0 0 20px var(--neon); transform: scale(1.1); }

    .reels { display:flex; gap:12px; margin:20px 0; justify-content:center; }
    .reel { width:85px; height:110px; background:#000; border:1px solid var(--gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; box-shadow: inset 0 0 20px rgba(212,175,55,0.1); }

    .btn { width: 100%; padding: 20px; font-family: 'Orbitron'; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: 0.2s; font-size: 1rem; }
    
    /* Botão de Jogar */
    .btn-spin { background: var(--gold); color: #000; box-shadow: 0 5px 0 #8a6d1d; }
    .btn-spin:active { transform: translateY(3px); box-shadow: 0 2px 0 #8a6d1d; }
    .btn-spin:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

    /* Botão de Pagar */
    .btn-pay { background: transparent; border: 2px solid var(--neon); color: var(--neon); text-decoration: none; display: flex; align-items: center; justify-content: center; }
    
    /* Botão de Confirmar (O principal) */
    .btn-verify { background: var(--neon); color: #000; display: none; box-shadow: 0 0 20px rgba(0,255,157,0.4); }

    #status { font-family: 'Share Tech Mono'; font-size: 0.7rem; color: var(--gold); margin-top: 15px; letter-spacing: 1px; min-height: 20px; text-transform: uppercase; }
    .blink { animation: flash 0.8s infinite; }
    @keyframes flash { 50% { opacity: 0.2; } }
</style>
</head>
<body>

<div class="monitor">
    <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 3px; margin-bottom: 10px;">LABRIOLAG HOLDING v25/25</div>
    
    <div class="balance-box">
        <div id="balance">⚡ 0</div>
        <div style="font-size: 0.6rem; color: var(--neon); opacity: 0.7;">SATS DISPONÍVEIS</div>
    </div>
    
    <div class="reels">
        <div class="reel" id="r1">💎</div>
        <div class="reel" id="r2">⚡</div>
        <div class="reel" id="r3">💰</div>
    </div>

    <button id="spinBtn" class="btn btn-spin" onclick="girarSlots()" disabled>SEM SALDO</button>

    <a id="payBtn" href="#" class="btn btn-pay" onclick="iniciarInjecao()">
        INJETAR 20 SATS
    </a>

    <button id="verifyBtn" class="btn btn-verify" onclick="validarAgora()">
        CONFIRMAR PAGAMENTO
    </button>

    <div id="status">SISTEMA ONLINE</div>
</div>

<script>
let credits = 0;
let urlVerificacao = "";
const icons = ["💎", "⚡", "💰", "🔥", "👑"];

// 1. GERA A FATURA E ABRE A BIPA
async function iniciarInjecao() {
    const status = document.getElementById('status');
    status.innerText = "GERANDO INVOICE...";
    status.classList.add('blink');

    try {
        const lnAddress = 'hurtkidney01@walletofsatoshi.com';
        const [user, domain] = lnAddress.split('@');
        
        const res = await fetch(`https://${domain}/.well-known/lnurlp/${user}`);
        const data = await res.json();
        
        const resInv = await fetch(`${data.callback}?amount=20000`);
        const invData = await resInv.json();
        
        urlVerificacao = invData.verify;

        // Abre a Bipa/Satoshi
        window.location.href = `lightning:${invData.pr}`;

        // Troca os botões
        document.getElementById('payBtn').style.display = 'none';
        document.getElementById('verifyBtn').style.display = 'block';
        status.innerText = "AGUARDANDO ENVIO NA BIPA...";
        
    } catch (e) {
        status.innerText = "ERRO NA REDE LIGHTNING";
        status.classList.remove('blink');
    }
}

// 2. O BOTÃO QUE O SENHOR PEDIU: VALIDA E ATUALIZA O SALDO
async function validarAgora() {
    if (!urlVerificacao) return;
    
    const status = document.getElementById('status');
    const balEl = document.getElementById('balance');
    status.innerText = "VALIDANDO COM A REDE...";
    
    try {
        const res = await fetch(urlVerificacao);
        const data = await res.json();

        if (data.settled === true) {
            // SUCESSO REAL
            credits += 20;
            
            // Efeito visual no saldo
            balEl.innerText = `⚡ ${credits}`;
            balEl.classList.add('balance-up');
            
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "GIRAR (1 SAT)";
            
            // Reset de botões
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('payBtn').style.display = 'block';
            
            status.innerText = "✓ PAGO: +20 SATS CREDITADOS";
            status.classList.remove('blink');
            urlVerificacao = "";

            setTimeout(() => balEl.classList.remove('balance-up'), 1000);
        } else {
            status.innerText = "A REDE AINDA NÃO CONFIRMOU.";
            setTimeout(() => status.innerText = "AGUARDANDO ENVIO NA BIPA...", 2000);
        }
    } catch (e) {
        status.innerText = "ERRO AO CONSULTAR SATOSHI.";
    }
}

function girarSlots() {
    if(credits <= 0) return;
    credits--;
    document.getElementById('balance').innerText = `⚡ ${credits}`;
    
    if(credits <= 0) {
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('spinBtn').innerText = "SEM SALDO";
    }

    const r1 = icons[Math.floor(Math.random()*icons.length)];
    const r2 = icons[Math.floor(Math.random()*icons.length)];
    const r3 = icons[Math.floor(Math.random()*icons.length)];

    document.getElementById('r1').innerText = r1;
    document.getElementById('r2').innerText = r2;
    document.getElementById('r3').innerText = r3;

    if(r1 === r2 && r2 === r3) {
        credits += 50;
        document.getElementById('balance').innerText = `⚡ ${credits}`;
        document.getElementById('status').innerText = "JACKPOT! +50 SATS";
        document.getElementById('balance').classList.add('balance-up');
        setTimeout(() => document.getElementById('balance').classList.remove('balance-up'), 1000);
    }
}
</script>
</body>
</html>
