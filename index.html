<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABRIOLAGame — CORE 25/25</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37;
  --gold-dim: #8a6d1d;
  --neon: #00ff9d;
  --neon-dim: #00994d;
  --red: #ff3b3b;
  --bg: #05050a;
  --panel: #080810;
  --border: rgba(212,175,55,0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Orbitron', sans-serif;
  background: var(--bg);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Ambient glow */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,255,157,0.04) 0%, transparent 70%);
  pointer-events: none;
}

/* ── MACHINE ── */
.machine {
  position: relative;
  width: 360px;
}

.machine-top {
  background: linear-gradient(180deg, #1a1400 0%, var(--panel) 100%);
  border: 2px solid var(--gold);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  padding: 16px 24px 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.machine-top::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--neon), var(--gold), transparent);
  animation: scan 3s linear infinite;
}

@keyframes scan {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}

.logo-line {
  font-size: 0.5rem;
  letter-spacing: 5px;
  color: rgba(212,175,55,0.5);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.logo {
  font-size: 1.4rem;
  font-weight: 900;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--gold), #fff8d6, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 12px rgba(212,175,55,0.5));
}

.machine-body {
  background: var(--panel);
  border-left: 2px solid var(--gold);
  border-right: 2px solid var(--gold);
  padding: 20px 24px;
}

.machine-bottom {
  background: linear-gradient(180deg, var(--panel) 0%, #0a0a18 100%);
  border: 2px solid var(--gold);
  border-top: 1px solid rgba(212,175,55,0.2);
  border-radius: 0 0 18px 18px;
  padding: 16px 24px 22px;
  text-align: center;
}

/* ── BALANCE ── */
.balance-wrap {
  background: #000;
  border: 1px solid var(--neon-dim);
  border-radius: 8px;
  padding: 10px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.balance-label {
  font-family: 'Share Tech Mono';
  font-size: 0.55rem;
  color: rgba(0,255,157,0.5);
  letter-spacing: 2px;
}

#balance {
  font-family: 'Share Tech Mono';
  font-size: 1.6rem;
  color: var(--neon);
  text-shadow: 0 0 15px var(--neon), 0 0 30px rgba(0,255,157,0.3);
  transition: all 0.3s;
}

#balance.pulse {
  animation: balancePulse 0.4s ease;
}

@keyframes balancePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); color: #fff; }
}

/* ── REELS ── */
.reels-container {
  position: relative;
  background: #000;
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}

.reels-container::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  transform: translateY(-50%);
  height: 74px;
  background: rgba(212,175,55,0.04);
  border-top: 1px solid rgba(212,175,55,0.2);
  border-bottom: 1px solid rgba(212,175,55,0.2);
  pointer-events: none;
}

.reels {
  display: flex;
  gap: 8px;
  justify-content: center;
  position: relative;
}

.reel-wrap {
  flex: 1;
  height: 80px;
  overflow: hidden;
  border-radius: 6px;
  background: #030308;
  border: 1px solid rgba(212,175,55,0.15);
  position: relative;
}

.reel-strip {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.05s linear;
}

.reel-symbol {
  height: 80px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.6rem;
  flex-shrink: 0;
}

.reel-win .reel-wrap {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(212,175,55,0.4), inset 0 0 20px rgba(212,175,55,0.05);
  animation: winReel 0.6s ease infinite alternate;
}

@keyframes winReel {
  from { box-shadow: 0 0 20px rgba(212,175,55,0.4); }
  to { box-shadow: 0 0 40px rgba(212,175,55,0.8), inset 0 0 20px rgba(212,175,55,0.1); }
}

/* ── JACKPOT OVERLAY ── */
.jackpot-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 100;
}

.jackpot-overlay.show {
  display: flex;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.jackpot-text {
  font-size: 3rem;
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--gold), #fff, var(--neon), var(--gold));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 1.5s linear infinite;
  margin-bottom: 10px;
  text-align: center;
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

.jackpot-sub {
  font-family: 'Share Tech Mono';
  color: var(--neon);
  font-size: 1rem;
  margin-bottom: 24px;
  letter-spacing: 3px;
}

.jackpot-close {
  font-family: 'Orbitron';
  font-weight: 700;
  background: var(--gold);
  color: #000;
  border: none;
  padding: 12px 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  letter-spacing: 2px;
}

/* Particles */
.particle {
  position: fixed;
  pointer-events: none;
  font-size: 1.5rem;
  animation: particleFall 2s ease-out forwards;
  z-index: 99;
}

@keyframes particleFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── BUTTONS ── */
.btn {
  width: 100%;
  padding: 16px;
  font-family: 'Orbitron';
  font-weight: 900;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  font-size: 0.75rem;
  letter-spacing: 2px;
  transition: all 0.15s;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
  border-radius: 8px;
}

.btn-spin {
  background: linear-gradient(135deg, #c9a227, var(--gold), #f0cc60);
  color: #000;
  box-shadow: 0 5px 0 var(--gold-dim), 0 0 20px rgba(212,175,55,0.3);
  font-size: 0.9rem;
}

.btn-spin:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 7px 0 var(--gold-dim), 0 0 30px rgba(212,175,55,0.5);
}

.btn-spin:active:not(:disabled) {
  transform: translateY(3px);
  box-shadow: 0 2px 0 var(--gold-dim);
}

.btn-spin:disabled {
  background: #1a1a1a;
  color: #444;
  box-shadow: none;
  cursor: not-allowed;
}

.btn-spin.spinning {
  animation: spinPulse 0.4s ease infinite alternate;
}

@keyframes spinPulse {
  from { box-shadow: 0 5px 0 var(--gold-dim), 0 0 20px rgba(212,175,55,0.3); }
  to { box-shadow: 0 5px 0 var(--gold-dim), 0 0 40px rgba(212,175,55,0.6); }
}

.btn-pay {
  background: transparent;
  border: 1px solid var(--neon-dim);
  color: var(--neon);
  text-decoration: none;
  display: block;
  text-align: center;
  line-height: 1;
}

.btn-pay:hover { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,157,0.2); }

.btn-verify {
  background: transparent;
  border: 1px solid var(--neon);
  color: var(--neon);
  display: none;
  animation: verifyPulse 1.5s ease infinite;
}

@keyframes verifyPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(0,255,157,0.3); }
  50% { box-shadow: 0 0 20px rgba(0,255,157,0.6); }
}

/* ── STATUS BAR ── */
.status-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  min-height: 18px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--neon);
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--neon);
}

.status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
.status-dot.loading { animation: dotBlink 0.8s infinite; }

@keyframes dotBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.1; }
}

#status-bar {
  font-family: 'Share Tech Mono';
  font-size: 0.6rem;
  color: rgba(212,175,55,0.7);
  letter-spacing: 1px;
}

/* ── FOOTER ORNAMENT ── */
.footer-ornament {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  margin-top: 6px;
}

.orn-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3)); }
.orn-line:last-child { background: linear-gradient(270deg, transparent, rgba(212,175,55,0.3)); }
.orn-text { font-size: 0.45rem; letter-spacing: 3px; color: rgba(212,175,55,0.4); }

/* Corner decorations */
.corner {
  position: absolute;
  width: 12px;
  height: 12px;
}

.corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
.corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--neon); border-right: 2px solid var(--neon); }
.corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--neon); border-left: 2px solid var(--neon); }
.corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--neon); border-right: 2px solid var(--neon); }

/* Bet info row */
.bet-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
  font-family: 'Share Tech Mono';
  font-size: 0.6rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 1px;
}

.bet-info span { color: rgba(212,175,55,0.6); }
</style>
</head>
<body>

<!-- JACKPOT OVERLAY -->
<div class="jackpot-overlay" id="jackpotOverlay">
  <div class="jackpot-text">💎 JACKPOT 💎</div>
  <div class="jackpot-sub">+ 50 SATS CREDITADOS</div>
  <button class="jackpot-close" onclick="closeJackpot()">RECOLHER GANHOS</button>
</div>

<div class="machine">
  <!-- TOP -->
  <div class="machine-top">
    <div class="logo-line">SOBERANIA FINANCEIRA</div>
    <div class="logo">LABRIOLA<span style="color:var(--neon);-webkit-text-fill-color:var(--neon)">GAME</span></div>
    <div style="font-size:0.45rem;letter-spacing:3px;color:rgba(255,255,255,0.2);margin-top:4px;">CORE 25 / 25 — LIGHTNING NETWORK</div>
  </div>

  <!-- BODY -->
  <div class="machine-body">

    <!-- Balance -->
    <div class="balance-wrap">
      <div class="balance-label">SALDO ATUAL</div>
      <div id="balance">⚡ 0 SATS</div>
    </div>

    <!-- Reels -->
    <div class="reels-container">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="reels" id="reels">
        <div class="reel-wrap" id="rw1"><div class="reel-strip" id="rs1"><div class="reel-symbol">💎</div></div></div>
        <div class="reel-wrap" id="rw2"><div class="reel-strip" id="rs2"><div class="reel-symbol">⚡</div></div></div>
        <div class="reel-wrap" id="rw3"><div class="reel-strip" id="rs3"><div class="reel-symbol">💰</div></div></div>
      </div>
    </div>

    <!-- Bet info -->
    <div class="bet-info">
      <div>APOSTA: <span>1 SAT / GIRO</span></div>
      <div>JACKPOT: <span>50 SATS</span></div>
      <div>CHANCE: <span>1/25</span></div>
    </div>

    <!-- Spin button -->
    <button id="spinBtn" class="btn btn-spin" onclick="rodar()" disabled>SEM CRÉDITOS</button>

  </div>

  <!-- BOTTOM -->
  <div class="machine-bottom">

    <a id="payBtn" href="#" class="btn btn-pay" onclick="fluxoPagamento(); return false;">
      ⚡ INJETAR 20 SATS VIA BIPA
    </a>

    <button id="verifyBtn" class="btn btn-verify" onclick="verificarFatura()">
      ✓ CONFIRMAR PAGAMENTO
    </button>

    <div class="status-wrap">
      <div class="status-dot" id="statusDot"></div>
      <div id="status-bar">SISTEMA PRONTO — AGUARDANDO DEPÓSITO</div>
    </div>

    <div class="footer-ornament">
      <div class="orn-line"></div>
      <div class="orn-text">BITCOIN ONLY</div>
      <div class="orn-line"></div>
    </div>
  </div>
</div>

<script>
let credits = 0;
let verifyUrlGlobal = "";
let isSpinning = false;
const icons = ["💎", "⚡", "💰", "🔥", "👑"];

function setStatus(msg, type = 'ok') {
  const dot = document.getElementById('statusDot');
  const bar = document.getElementById('status-bar');
  bar.innerText = msg;
  dot.className = 'status-dot';
  if (type === 'error') dot.classList.add('error');
  if (type === 'loading') dot.classList.add('loading');
}

function updateBalance(val, animate = false) {
  credits = val;
  const el = document.getElementById('balance');
  el.innerText = `⚡ ${credits} SATS`;
  if (animate) {
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 400);
  }
  const spinBtn = document.getElementById('spinBtn');
  spinBtn.disabled = credits <= 0;
  spinBtn.innerText = credits > 0 ? '▶ GIRAR SLOTS' : 'SEM CRÉDITOS';
}

// ── SPIN ANIMATION ──
function animateReel(stripId, finalIcon, delay) {
  return new Promise(resolve => {
    const strip = document.getElementById(stripId);
    const TICK = 60;
    const TICKS = 12 + delay * 4;
    let count = 0;

    const interval = setInterval(() => {
      const icon = icons[Math.floor(Math.random() * icons.length)];
      strip.innerHTML = `<div class="reel-symbol">${icon}</div>`;
      count++;
      if (count >= TICKS) {
        clearInterval(interval);
        strip.innerHTML = `<div class="reel-symbol">${finalIcon}</div>`;
        resolve();
      }
    }, TICK);
  });
}

async function rodar() {
  if (credits <= 0 || isSpinning) return;
  isSpinning = true;

  const spinBtn = document.getElementById('spinBtn');
  spinBtn.classList.add('spinning');
  spinBtn.disabled = true;
  spinBtn.innerText = 'GIRANDO...';
  document.getElementById('reels').classList.remove('reel-win');

  const newCredits = credits - 1;
  document.getElementById('balance').innerText = `⚡ ${newCredits} SATS`;

  const r1 = icons[Math.floor(Math.random() * icons.length)];
  const r2 = icons[Math.floor(Math.random() * icons.length)];
  const r3 = icons[Math.floor(Math.random() * icons.length)];

  setStatus('ROLANDO...', 'loading');

  await Promise.all([
    animateReel('rs1', r1, 0),
    animateReel('rs2', r2, 1),
    animateReel('rs3', r3, 2),
  ]);

  credits = newCredits;
  const isJackpot = (r1 === r2 && r2 === r3);

  if (isJackpot) {
    credits += 50;
    document.getElementById('reels').classList.add('reel-win');
    launchParticles();
    setTimeout(() => {
      document.getElementById('jackpotOverlay').classList.add('show');
    }, 400);
  }

  updateBalance(credits);
  setStatus(isJackpot ? '💎 JACKPOT! +50 SATS' : (credits > 0 ? 'BOA SORTE...' : 'SEM CRÉDITOS — RECARREGUE'));

  spinBtn.classList.remove('spinning');
  isSpinning = false;
}

function launchParticles() {
  const emojis = ['💎', '⚡', '🌟', '💰', '✨'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = '-30px';
    p.style.animationDuration = (1.5 + Math.random()) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

function closeJackpot() {
  document.getElementById('jackpotOverlay').classList.remove('show');
}

// ── PAYMENT FLOW ──
async function fluxoPagamento() {
  setStatus('GERANDO FATURA LIGHTNING...', 'loading');

  try {
    const lnAddress = 'hurtkidney01@walletofsatoshi.com';
    const [user, domain] = lnAddress.split('@');

    const res = await fetch(`https://${domain}/.well-known/lnurlp/${user}`);
    const data = await res.json();

    const resInvoice = await fetch(`${data.callback}?amount=20000`);
    const invData = await resInvoice.json();

    verifyUrlGlobal = invData.verify;

    window.location.href = `lightning:${invData.pr}`;

    document.getElementById('payBtn').style.display = 'none';
    document.getElementById('verifyBtn').style.display = 'block';
    setStatus('PAGUE NA BIPA E CLIQUE EM CONFIRMAR', 'loading');

  } catch (e) {
    setStatus('ERRO DE CONEXÃO COM A REDE', 'error');
    console.error(e);
  }
}

async function verificarFatura() {
  if (!verifyUrlGlobal) return;

  setStatus('CONSULTANDO REDE LIGHTNING...', 'loading');

  try {
    const res = await fetch(verifyUrlGlobal);
    const data = await res.json();

    if (data.settled === true) {
      updateBalance(credits + 20, true);

      document.getElementById('verifyBtn').style.display = 'none';
      document.getElementById('payBtn').style.display = 'block';

      setStatus('✓ PAGAMENTO CONFIRMADO — +20 SATS');
      verifyUrlGlobal = '';

      // Flash the balance
      const el = document.getElementById('balance');
      el.style.color = '#fff';
      setTimeout(() => { el.style.color = ''; }, 600);

    } else {
      setStatus('PAGAMENTO AINDA NÃO DETECTADO', 'error');
    }
  } catch (e) {
    setStatus('ERRO AO VERIFICAR — TENTE NOVAMENTE', 'error');
  }
}
</script>
</body>
</html>
