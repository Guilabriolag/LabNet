<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABRIOLAGame — Validação Manual</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root { --gold: #d4af37; --neon: #00ff9d; --bg: #000; }
    body { margin:0; font-family: 'Orbitron', sans-serif; background: var(--bg); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
    
    .monitor { border: 2px solid var(--gold); padding: 25px; border-radius: 15px; background: rgba(10,10,10,0.95); text-align: center; width: 340px; box-shadow: 0 0 40px rgba(212,175,55,0.2); }
    #balance { font-family: 'Share Tech Mono'; color: var(--neon); font-size: 2.2rem; margin: 10px 0; text-shadow: 0 0 10px var(--neon); }
    
    .reels { display:flex; gap:10px; margin:20px 0; justify-content:center; }
    .reel { width:80px; height:100px; background:#050505; border:1px solid var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; }

    .btn { width: 100%; padding: 18px; font-family: 'Orbitron'; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: 0.2s; font-size: 0.9rem; }
    .btn-spin { background: var(--gold); color: #000; box-shadow: 0 4px 0 #8a6d1d; }
    .btn-spin:disabled { opacity: 0.1; }

    .btn-pay { background: #004422; border: 1px solid var(--neon); color: var(--neon); text-decoration: none; display: block; }
    .btn-verify { background: var(--neon); color: #000; display: none; } /* Escondido até o pagamento iniciar */

    #status-bar { font-family: 'Share Tech Mono'; font-size: 0.65rem; color: var(--gold); margin-top: 10px; min-height: 15px; }
    .loading { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="monitor">
    <div style="font-size: 0.6rem; opacity: 0.6; letter-spacing: 2px; margin-bottom: 10px;">CORE 25/25 — SOBERANIA</div>
    
    <div id="balance">⚡ 0 SATS</div>
    
    <div class="reels">
        <div class="reel" id="r1">💎</div>
        <div class="reel" id="r2">⚡</div>
        <div class="reel" id="r3">💰</div>
    </div>

    <button id="spinBtn" class="btn btn-spin" onclick="rodar()" disabled>SEM CRÉDITOS</button>

    <a id="payBtn" href="#" class="btn btn-pay" onclick="fluxoPagamento()">
        INJETAR 20 SATS (BIPA)
    </a>

    <button id="verifyBtn" class="btn btn-verify" onclick="verificarFatura()">
        CONFIRMAR PAGAMENTO
    </button>

    <div id="status-bar">SISTEMA PRONTO</div>
</div>

<script>
let credits = 0;
let verifyUrlGlobal = "";
const icons = ["💎", "⚡", "💰", "🔥", "👑"];

// PASSO 1: GERAR A FATURA E ABRIR A BIPA
async function fluxoPagamento() {
    const status = document.getElementById('status-bar');
    status.innerText = "GERANDO FATURA...";
    
    try {
        const lnAddress = 'hurtkidney01@walletofsatoshi.com';
        const [user, domain] = lnAddress.split('@');
        
        // Busca o callback do seu LN Address
        const res = await fetch(`https://${domain}/.well-known/lnurlp/${user}`);
        const data = await res.json();
        
        // Pede invoice de 20 sats (20000 msats)
        const resInvoice = await fetch(`${data.callback}?amount=20000`);
        const invData = await resInvoice.json();
        
        verifyUrlGlobal = invData.verify; // Guarda o link de conferência

        // Abre a Bipa/Satoshi
        window.location.href = `lightning:${invData.pr}`;

        // Troca os botões
        document.getElementById('payBtn').style.display = 'none';
        document.getElementById('verifyBtn').style.display = 'block';
        status.innerText = "PAGUE NA BIPA E CLIQUE EM CONFIRMAR";
        
    } catch (e) {
        status.innerText = "ERRO DE CONEXÃO";
        console.error(e);
    }
}

// PASSO 2: BOTÃO MANUAL PARA ATUALIZAR O SALDO
async function verificarFatura() {
    if (!verifyUrlGlobal) return;
    
    const status = document.getElementById('status-bar');
    status.innerText = "CONSULTANDO REDE LIGHTNING...";
    status.classList.add('loading');

    try {
        const res = await fetch(verifyUrlGlobal);
        const data = await res.json();

        if (data.settled === true) {
            // SUCESSO!
            credits += 20;
            document.getElementById('balance').innerText = `⚡ ${credits} SATS`;
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "GIRAR SLOTS";
            
            // Volta o botão de injetar para novos depósitos
            document.getElementById('verifyBtn').style.display = 'none';
            document.getElementById('payBtn').style.display = 'block';
            
            status.innerText = "PAGAMENTO CONFIRMADO! +20 SATS";
            status.classList.remove('loading');
            alert("Sats reconhecidos na conta!");
        } else {
            status.innerText = "PAGAMENTO AINDA NÃO DETECTADO.";
            status.classList.remove('loading');
        }
    } catch (e) {
        status.innerText = "ERRO AO VERIFICAR. TENTE NOVAMENTE.";
    }
}

function rodar() {
    if(credits <= 0) return;
    credits--;
    document.getElementById('balance').innerText = `⚡ ${credits} SATS`;
    
    if(credits <= 0) {
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('spinBtn').innerText = "SEM CRÉDITOS";
    }

    const r1 = icons[Math.floor(Math.random()*icons.length)];
    const r2 = icons[Math.floor(Math.random()*icons.length)];
    const r3 = icons[Math.floor(Math.random()*icons.length)];

    document.getElementById('r1').innerText = r1;
    document.getElementById('r2').innerText = r2;
    document.getElementById('r3').innerText = r3;

    if(r1 === r2 && r2 === r3) {
        credits += 50;
        document.getElementById('balance').innerText = `⚡ ${credits} SATS`;
        alert("💎 JACKPOT! +50 SATS 💎");
    }
}
</script>
</body>
</html>
