<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABRIOLAG - Core 25/25</title>
    <style>
        body { background: #000; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 20px; transition: 0.1s; overflow: hidden; }
        .monitor { border: 2px dashed #d4af37; padding: 20px; border-radius: 10px; margin-top: 10vh; }
        #frequencia { font-size: 0.7rem; color: #555; margin-bottom: 10px; }
        #status { font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }
        #log-area { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; font-size: 0.9rem; color: #00ffcc; }
        .blink { animation: blinker 0.03s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="monitor">
        <div id="frequencia">FREQUÊNCIA DE ESCUTA: 0.03s (33Hz)</div>
        <div id="status">AGUARDANDO SATS...</div>
        <p style="font-size: 0.8rem;">hurtkidney01@walletofsatoshi.com</p>
        
        <div id="log-area">Sismógrafo em Standby</div>
    </div>

    <script>
        const DICIONARIO = {
            "1": "MÓDULO ATIVADO",
            "2": "SISTEMA FINANCEIRO ON",
            "3": "ACESSO LIBERADO",
            "4": "PROTOCOLO MINERVA",
            "21": "SOBERANIA ALCANÇADA"
        };

        let ultimoSaldo = 0;

        // --- MOTOR DE ALTA FREQUÊNCIA (0.03s) ---
        setInterval(() => {
            // No celular, o Sismógrafo lê a "fofoca" da URL ou do Cache de Rede
            const urlParams = new URLSearchParams(window.location.search);
            const satsDetectados = urlParams.get('sats');

            if (satsDetectados && satsDetectados !== ultimoSaldo) {
                ultimoSaldo = satsDetectados;
                ativarTranscricao(satsDetectados);
            }
        }, 30); // 0.03 segundos

        function ativarTranscricao(sats) {
            const statusDiv = document.getElementById('status');
            const logDiv = document.getElementById('log-area');
            const traducao = DICIONARIO[sats] || "PULSO: " + sats + " SATS";

            statusDiv.innerText = "⚡ PULSO DETECTADO! ⚡";
            statusDiv.classList.add('blink');
            logDiv.innerHTML = `<strong>${traducao}</strong><br>Energia Validada na LN`;

            if (sats == "21") {
                document.body.style.background = "#d4af37";
                document.body.style.color = "#000";
            }
            
            // Limpa o pulso após 2 segundos para voltar a ouvir
            setTimeout(() => {
                statusDiv.classList.remove('blink');
                statusDiv.innerText = "OUVINDO REDE...";
            }, 2000);
        }
    </script>
</body>
</html>
